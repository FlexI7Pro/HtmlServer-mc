<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Packet Repository</title>
</head>
<body>
    <!-- هذا الجزء يحتوي على بايتات حزمة ماين كرافت جاهزة ومكتوبة داخل الصفحة -->
    <div id="packet-data">
        {"version":{"name":"1.8.9","protocol":47},"players":{"max":100,"online":45,"sample":[]},"description":{"text":"§a§lسيرفر جيت هاب الناجح! 🎉"}}
    </div>

    <script>
        // دالة تحويل النص إلى بايتات هكس (Hex) لنسهل على Node.js قراءتها
        function getVarIntBytes(value) {
            let buffer = [];
            while (true) {
                if ((value & ~0x7F) === 0) {
                    buffer.push(value);
                    return buffer;
                }
                buffer.push((value & 0x7F) | 0x80);
                value >>>= 7;
            }
        }

        // صياغة الحزمة وتخزينها في الصفحة بشكل مخفي ومجهز للـ Node.js
        const responseJson = document.getElementById('packet-data').innerText.trim();
        const jsonBytes = Array.from(new TextEncoder().encode(responseJson));
        const packetId = [0x00];
        const jsonLengthVarInt = getVarIntBytes(jsonBytes.length);
        const innerPacket = [].concat(packetId, jsonLengthVarInt, jsonBytes);
        const totalLengthVarInt = getVarIntBytes(innerPacket.length);
        const finalPacketBytes = [].concat(totalLengthVarInt, innerPacket);

        // تحويل المصفوفة إلى نص هكس لسهولة قراءته من السيرفر
        const hexString = finalPacketBytes.map(b => b.toString(16).padStart(2, '0')).join('');
        
        // مسح المحتوى القديم وكتابة الـ Hex فقط في الصفحة
        document.body.innerHTML = `<pre id="hex-output">${hexString}</pre>`;
    </script>
</body>
</html>
