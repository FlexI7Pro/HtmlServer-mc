<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>SaaS Minecraft Packet Generator</title>
    <style>
        body { background-color: #ffffff; margin: 0; padding: 0; }
        #raw-packets-delivery { display: none; }
    </style>
</head>
<body>

    <div id="raw-packets-delivery"></div>

    <script>
        function getVarIntBytes(value) {
            let buffer = [];
            while (true) {
                if ((value & ~0x7F) === 0) {
                    buffer.push(value);
                    return buffer;
                }
                buffer.push((value & 0x7F) | 0x80);
                value >>>= 7;
            }
        }

        function makePacket(packetId, payloadArray) {
            const innerPacket = [packetId].concat(payloadArray);
            const totalLength = getVarIntBytes(innerPacket.length);
            return totalLength.concat(innerPacket);
        }

        // 1. حزمة الـ Join Game القياسية لـ 1.8.9 (Protocol 47)
        const joinGamePayload = [
            0x00, 0x00, 0x00, 0x01, // Entity ID (1)
            0x01,                   // Game Mode (1 = Creative)
            0x00,                   // Dimension (0 = Overworld)
            0x00,                   // Difficulty (0 = Peaceful)
            0x64,                   // Max Players (100)
            0x05, 0x66, 0x6c, 0x61, 0x74, // World Type ("flat")
            0x00                    // Reduced Debug Info (False)
        ];
        const joinGamePacket = makePacket(0x01, joinGamePayload);

        // 2. حزمة الـ Player Position And Look لتثبيت اللاعب وإجباره على التحميل
        const positionPayload = [
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, // X = 0.0 (Double)
            0x40, 0x50, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, // Y = 64.0 (Double)
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, // Z = 0.0 (Double)
            0x00, 0x00, 0x00, 0x00,                         // Yaw = 0.0 (Float)
            0x00, 0x00, 0x00, 0x00,                         // Pitch = 0.0 (Float)
            0x00,                                           // Flags (0)
            0x00                                            // Teleport ID (0 في 1.8)
        ];
        const positionPacket = makePacket(0x08, positionPayload);

        // دمج الحزمتين الأساسيتين لبدء اللعب وتجاوز شاشة الدخول
        const allPlayPackets = [].concat(joinGamePacket, positionPacket);

        // تحويل إلى Hex
        const finalHexDelivery = allPlayPackets.map(b => b.toString(16).padStart(2, '0')).join('');
        document.getElementById('raw-packets-delivery').innerText = finalHexDelivery;
    </script>
</body>
</html>
